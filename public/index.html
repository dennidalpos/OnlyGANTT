<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnlyGANTT</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="root"></div>

  <!-- React 18 and ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load scripts in strict order (NO bundler, NO ES modules) -->

  <!-- 1. Config (plain JS) -->
  <script src="/src/app-config.js"></script>

  <!-- 2. Utils (plain JS) -->
  <script src="/src/utils/easter.js"></script>
  <script src="/src/utils/utils-date.js"></script>
  <script src="/src/utils/utils-logic.js"></script>
  <script src="/src/utils/utils-gantt.js"></script>

  <!-- 3. Client modules (plain JS) -->
  <script src="/src/client/api.js"></script>
  <script src="/src/client/storage.js"></script>

  <!-- 4. Hooks (plain JS) -->
  <script src="/src/client/hooks/useDepartmentLock.js"></script>
  <script src="/src/client/hooks/useProjects.js"></script>

  <!-- 5. React components (JSX via Babel) -->
  <script type="text/babel" src="/src/client/components/HeaderBar.jsx"></script>
  <script type="text/babel" src="/src/client/components/DepartmentSelector.jsx"></script>
  <script type="text/babel" src="/src/client/components/GanttControls.jsx"></script>
  <script type="text/babel" src="/src/client/components/GanttCanvas.jsx"></script>
  <script type="text/babel" src="/src/client/components/ProjectForm.jsx"></script>
  <script type="text/babel" src="/src/client/components/ProjectList.jsx"></script>
  <script type="text/babel" src="/src/client/components/AlertsPanel.jsx"></script>

  <!-- 6. Main App (JSX via Babel) -->
  <script type="text/babel" src="/src/client/app.jsx"></script>
</body>
</html>
